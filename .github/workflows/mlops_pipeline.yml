name: Daily MLOps Pipeline Automation

on:
  schedule:
    - cron: '30 2 * * *' # Fires automatically every single day at 2:30 AM UTC
  workflow_dispatch: # Allows manual trigger execution anytime from the GitHub interface

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Pipeline Component Scripts
        run: |
          python src/src/data_ingestion.py
          python src/src/model_training.py

      - name: Commit and Push Automated Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ models/
          # Only commit if data or metrics files actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: daily pipeline execution metrics update [skip ci]" && git push)
